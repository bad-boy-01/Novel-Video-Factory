# Default Configuration for Novel Video Factory

project:
  language:
    source: "Chinese"
    target: "English"
  currency:
    mode: "preserve" # preserve, replace_symbol_keep_number
  units:
    mode: "hybrid" # preserve, hybrid, convert

models:
  translation:
    primary:
      provider: "local" # options: local, groq, openai, gemini
      model: "qwen2.5:7b" # for gemini use 'gemini-flash-latest' or 'gemini-2.5-flash'
    backup:
      provider: "ollama"
      model: "gemma2"
  revision:
    provider: "ollama"
    model: "qwen2.5:7b"
  prompt_generation:
    provider: "ollama"
    model: "qwen2.5:7b"
  image_generation:
    provider: "diffusers" # diffusers or comfyui
    model: "cagliostrolab/animagine-xl-3.1" # Open anime SDXL model
  audio:
    provider: "coqui"
    model: "tts_models/en/vctk/vits"
    voice: "p267"

hardware:
  device: "cuda" # cuda, cpu, mps
  precision: "fp16" # fp16, bf16, fp32

video:
  font: "Arial"
  font_size: 40
  fps: 24
  crossfade_duration: 0.5
  output_format: "mp4"

prompts:
  style_modifier: "webtoon, korean comic, manhwa, flat colors, high-quality, cinematic, detailed lighting, masterpiece"
  negative_prompt: "ugly, blurry, low res, extra limbs, bad anatomy"

system:
  cache_enabled: true
  qa_enabled: true
