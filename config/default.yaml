# Default Configuration for Novel Video Factory

project:
  language:
    source: "Chinese"
    target: "English"
  currency:
    mode: "preserve" # preserve, replace_symbol_keep_number
  units:
    mode: "hybrid" # preserve, hybrid, convert

models:
  translation:
    primary:
      provider: "local" # options: local, groq, openai, gemini
      model: "qwen2.5:7b" # for gemini use 'gemini-flash-latest' or 'gemini-2.5-flash'
    backup:
      provider: "ollama"
      model: "gemma2"
  revision:
    provider: "ollama"
    model: "qwen2.5:7b"
  prompt_generation:
    provider: "ollama"
    model: "qwen2.5:7b"
  image_generation:
    provider: "diffusers" # diffusers or comfyui
    model: "cagliostrolab/animagine-xl-4.0" # Latest high-quality anime SDXL model
  audio:
    provider: "coqui"
    model: "tts_models/en/vctk/vits"
    voice: "p267"

hardware:
  device: "cuda" # cuda, cpu, mps
  precision: "fp16" # fp16, bf16, fp32

video:
  font: "Arial-Bold"
  font_size: 44
  fps: 24
  crossfade_duration: 0.5
  output_format: "mp4"
  clip_duration: 600 # Target duration in seconds (10 minutes)
  motion_zoom_speed: 0.04

prompts:
  style_modifier: "manhwa, webtoon, korean style, sharp lineart, high saturation, year 2024"
  negative_prompt: "lowres, bad anatomy, bad hands, text, error, missing finger, extra digits, fewer digits, cropped, worst quality, low quality, low score, bad score, average score, signature, watermark, username, blurry"

system:
  cache_enabled: true
  qa_enabled: true
  gdrive_folder_id: "" # Optional: ID of the Drive folder to upload to
  gdrive_creds_path: "credentials/gdrive_service_account.json" # Optional: Local path for non-Kaggle runs
